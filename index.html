    <script type="text/babel">
        const { useState, useEffect, useMemo, useRef, Component } = React;
        
        // --- Icon System ---
        const Icon = ({ children, size = 24, className = "", ...props }) => (

                {children}
            </svg>
        );

        const User = (props) => <Icon {...props}><path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></Icon>;
        const Plus = (props) => <Icon {...props}><path d="M5 12h14"/><path d="M12 5v14"/></Icon>;
        const Search = (props) => <Icon {...props}><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></Icon>;
        const Trash2 = (props) => <Icon {...props}><path d="M3 6h18"/><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"/><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"/><line x1="10" x2="10" y1="11" y2="17"/><line x1="14" x2="14" y1="11" y2="17"/></Icon>;
        const Save = (props) => <Icon {...props}><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></Icon>;
        const ArrowLeft = (props) => <Icon {...props}><line x1="19" x2="5" y1="12" y2="12"/><polyline points="12 19 5 12 12 5"/></Icon>;
        const AlertCircle = (props) => <Icon {...props}><circle cx="12" cy="12" r="10"/><line x1="12" x2="12" y1="8" y2="12"/><line x1="12" x2="12.01" y1="16" y2="16"/></Icon>;
        const CheckCircle = (props) => <Icon {...props}><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></Icon>;
        const Baby = (props) => <Icon {...props}><path d="M9 12h.01"/><path d="M15 12h.01"/><path d="M10 16c.5.3 1.2.5 2 .5s1.5-.2 2-.5"/><path d="M19 6.3a9 9 0 0 1 1.8 3.9 2 2 0 0 1 0 3.6 9 9 0 0 1-17.6 0 2 2 0 0 1 0-3.6A9 9 0 0 1 12 3c2 0 3.5 1.1 3.5 2.5s-.9 2.5-2 2.5c-.8 0-1.5-.4-1.5-1"/></Icon>;
        const Stethoscope = (props) => <Icon {...props}><path d="M4.8 2.3A.3.3 0 1 0 5 2H4a2 2 0 0 0-2 2v5a6 6 0 0 0 6 6v0a6 6 0 0 0 6-6V4a2 2 0 0 0-2-2h-1a.2.2 0 1 0 .3.3"/><path d="M8 15v1a6 6 0 0 0 6 6v0a6 6 0 0 0 6-6v-4"/><circle cx="20" cy="10" r="2"/></Icon>;
        const Share2 = (props) => <Icon {...props}><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><line x1="8.59" x2="15.42" y1="13.51" y2="17.49"/><line x1="15.41" x2="8.59" y1="6.51" y2="10.49"/></Icon>;
        const Copy = (props) => <Icon {...props}><rect width="14" height="14" x="8" y="8" rx="2" ry="2"/><path d="M4 16c-1.1 0-2-.9-2-2V4c0-1.1.9-2 2-2h10c1.1 0 2 .9 2 2v2"/></Icon>;
        const X = (props) => <Icon {...props}><path d="M18 6 6 18"/><path d="m6 6 12 12"/></Icon>;
        const LogOut = (props) => <Icon {...props}><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" x2="9" y1="12" y2="12"/></Icon>;
        const Edit = (props) => <Icon {...props}><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></Icon>;
        const Activity = (props) => <Icon {...props}><path d="M22 12h-4l-3 9L9 3l-3 9H2"/></Icon>;


        // --- Helper Functions ---
        function calculateAge(birthDate) {
            if (!birthDate) return "";
            const today = new Date();
            const birth = new Date(birthDate);
            let years = today.getFullYear() - birth.getFullYear();
            let months = today.getMonth() - birth.getMonth();
            let days = today.getDate() - birth.getDate();
            if (days < 0) { months--; days += new Date(today.getFullYear(), today.getMonth(), 0).getDate(); }
            if (months < 0) { years--; months += 12; }
            if (years >= 1) return `${years} año${years !== 1 ? 's' : ''}${months > 0 ? `, ${months} mes${months !== 1 ? 'es' : ''}` : ''}`;
            if (months >= 1) return `${months} mes${months !== 1 ? 'es' : ''}${days > 0 ? `, ${days} día${days !== 1 ? 's' : ''}` : ''}`;
            if (days >= 0) return `${days} día${days !== 1 ? 's' : ''}`;
            return "Fecha futura";
        }
        
        function calculateAgeAtDate(birthDateStr, consultationDateMs) {
            if (!birthDateStr || !consultationDateMs) return "";
            const birth = new Date(birthDateStr);
            const consultation = new Date(consultationDateMs);
            let years = consultation.getFullYear() - birth.getFullYear();
            let months = consultation.getMonth() - birth.getMonth();
            let days = consultation.getDate() - birth.getDate();
            if (days < 0) { months--; days += new Date(consultation.getFullYear(), consultation.getMonth(), 0).getDate(); }
            if (months < 0) { years--; months += 12; }
            if (years >= 1) return `${years} a${years !== 1 ? 'ños' : 'ño'}, ${months} m${months !== 1 ? 'eses' : 'es'}`;
            if (months >= 1) return `${months} m${months !== 1 ? 'eses' : 'es'}, ${days} d${days !== 1 ? 'ías' : 'ía'}`;
            return `${days} d${days !== 1 ? 'ías' : 'ía'}`;
        }

        function formatDate(timestamp) {
            if (!timestamp) return 'Sin fecha';
            const date = timestamp.toDate ? timestamp.toDate() : new Date(timestamp);
            return date.toLocaleDateString('es-AR', { day: '2-digit', month: 'short', year: 'numeric' }).replace('.', '');
        }
        
        function copyToClipboard(text) {
            const textarea = document.createElement('textarea');
            textarea.value = text;
            document.body.appendChild(textarea);
            textarea.select();
            try {
                document.execCommand('copy');
                return true;
            } catch (err) {
                return false;
            } finally {
                document.body.removeChild(textarea);
            }
        }

        function buildBackupData(patients) {
            const now = new Date();
            return {
                metadata: {
                    app: "PediApp",
                    schemaVersion: "1.0",
                    exportedAt: now.toISOString(),
                    patientCount: patients.length
                },
                patients: patients.map(p => ({
                    patientId: p.id || `local-${Date.now()}`,
                    identity: { firstName: p.firstName, lastName: p.lastName, dni: p.dni, birthDate: p.birthDate, phone: p.phone },
                    clinicalHistory: { neonatal: p.neonatalHistory || [], pathological: p.pathologicalHistory || [] },
                    consultations: (p.consultations || []).map(c => ({
                        consultationId: c.id,
                        date: new Date(c.date).toISOString().slice(0, 10),
                        motive: c.motive || [],
                        anthropometry: { weightKg: c.weight, heightCm: c.height, headCircumferenceCm: c.headCircumference },
                        notes: c.notes || ""
                    })),
                    pendingItems: p.pendingItems || [],
                    attachments: (p.images || []).map(img => ({ id: img.id, data: img.src, createdAt: img.date }))
                }))
            };
        }

        function downloadBackup(data) {
            const json = JSON.stringify(data, null, 2);
            const blob = new Blob([json], { type: "application/json" });
            const url = URL.createObjectURL(blob);
            const a = document.createElement("a");
            a.href = url;
            a.download = `pediapp-backup-${new Date().toISOString().slice(0, 10)}.json`;
            a.click();
            URL.revokeObjectURL(url);
        }
        
        function generatePatientSummary(patient) {
            const age = calculateAge(patient.birthDate);
            let summary = `--- Historia Clínica: ${patient.lastName}, ${patient.firstName} ---\nDNI: ${patient.dni}\n`;
            if (patient.phone) summary += `Tel: ${patient.phone}\n`;
            summary += `F. Nac: ${patient.birthDate} (${age})\n\n`;
            summary += `ANTECEDENTES NEONATALES:\n- ${patient.neonatalHistory?.join('\n- ') || 'Ninguno'}\n\n`;
            summary += `ANTECEDENTES PATOLÓGICOS:\n- ${patient.pathologicalHistory?.join('\n- ') || 'Ninguno'}\n\n`;
            if (patient.consultations?.length > 0) {
                summary += `CONSULTAS:\n`;
                [...patient.consultations].sort((a, b) => b.date - a.date).forEach(c => {
                    summary += `\n--- ${formatDate(c.date)} ---\n`;
                    if (c.motive?.length > 0) summary += `Motivo: ${c.motive.join(', ')}\n`;
                    if (c.weight || c.height || c.headCircumference) summary += `P: ${c.weight}kg | T: ${c.height}cm | PC: ${c.headCircumference}\n`;
                    if (c.notes) summary += `Notas: ${c.notes}\n`;
                });
            }
            return summary;
        }

        // --- UI Components ---
        const Card = ({ children, className = "", onClick }) => (
            <div onClick={onClick} className={`bg-white rounded-xl shadow-sm border border-slate-100 p-4 ${className}`}>
                {children}
            </div>
        );

        const Button = ({ children, onClick, variant = "primary", className = "", type = "button", disabled = false }) => {
            const baseStyle = "px-4 py-2 rounded-lg font-medium transition-all flex items-center justify-center gap-2 active:scale-95 disabled:opacity-50 disabled:cursor-not-allowed";
            const variants = {
                primary: "bg-sky-500 text-white hover:bg-sky-600 shadow-lg shadow-sky-500/30",
                secondary: "bg-slate-100 text-slate-700 hover:bg-slate-200",
                danger: "bg-rose-50 text-rose-600 hover:bg-rose-100 border border-rose-200",
                outline: "border-2 border-slate-200 text-slate-600 hover:border-sky-500 hover:text-sky-500"
            };
            return (
                <button type={type} onClick={onClick} disabled={disabled} className={`${baseStyle} ${variants[variant]} ${className}`}>
                    {children}
                </button>
            );
        };

        const Modal = ({ children, isOpen, onClose, title }) => {
            if (!isOpen) return null;
            return (
                <div className="fixed inset-0 bg-black/50 z-50 flex items-center justify-center p-4 animate-fade-in" onClick={onClose}>
                    <Card className="p-6 w-full max-w-md" onClick={(e) => e.stopPropagation()}>
                        <div className="flex justify-between items-start border-b pb-3 mb-4">
                            <h3 className="text-xl font-bold text-slate-800">{title}</h3>
                            <button onClick={onClose} className="text-slate-400 hover:text-slate-600 p-1"><X size={24} /></button>
                        </div>
                        {children}
                    </Card>
                </div>
            );
        };

        const ConfirmModal = ({ isOpen, title, message, onConfirm, onCancel }) => {
            if (!isOpen) return null;
            return (
                <div className="fixed inset-0 bg-black/60 z-[100] flex items-center justify-center p-4 animate-fade-in" onClick={onCancel}>
                    <Card className="p-6 w-full max-sm shadow-2xl scale-100" onClick={(e) => e.stopPropagation()}>
                        <h3 className="text-lg font-bold text-slate-800 mb-2">{title}</h3>
                        <p className="text-slate-600 text-sm mb-6 leading-relaxed">{message}</p>
                        <div className="flex gap-3">
                            <Button variant="secondary" className="flex-1" onClick={onCancel}>Cancelar</Button>
                            <Button variant="primary" className="flex-1 !bg-rose-500 hover:!bg-rose-600" onClick={onConfirm}>Confirmar</Button>
                        </div>
                    </Card>
                </div>
            );
        };

        const TagInput = ({ label, options, value = [], onChange, placeholder }) => {
            const [input, setInput] = useState("");
            const [isOpen, setIsOpen] = useState(false);
            const handleAdd = (tag) => {
                const cleanTag = tag.trim();
                if (cleanTag && !value.includes(cleanTag)) { onChange([...value, cleanTag]); }
                setInput(""); setIsOpen(false);
            };
            const handleRemove = (tagToRemove) => { onChange(value.filter(t => t !== tagToRemove)); };
            const filteredOptions = options.filter(opt => opt.toLowerCase().includes(input.toLowerCase()) && !value.includes(opt));
            return (
                <div className="space-y-2 relative">
                    <label className="block text-sm font-semibold text-slate-700">{label}</label>
                    <div className="flex flex-wrap gap-2 p-2 bg-slate-50 border border-slate-200 rounded-lg min-h-[42px]">
                        {value.map(tag => (
                            <span key={tag} className="bg-sky-100 text-sky-700 text-sm px-2 py-1 rounded-md flex items-center gap-1">
                                {tag}<button type="button" onClick={() => handleRemove(tag)}><X size={14} /></button>
                            </span>
                        ))}
                        <input
                            type="text" value={input}
                            onChange={(e) => { setInput(e.target.value); setIsOpen(true); }}
                            onFocus={() => setIsOpen(true)}
                            onBlur={() => setTimeout(() => setIsOpen(false), 200)}
                            onKeyDown={(e) => { if (e.key === 'Enter' && input.trim()) { e.preventDefault(); handleAdd(input.trim()); } }}
                            className="bg-transparent outline-none flex-1 min-w-[120px] text-sm"
                            placeholder={placeholder}
                        />
                    </div>
                    {isOpen && (input.length > 0 || filteredOptions.length > 0) && (
                        <div className="absolute z-10 top-full left-0 right-0 bg-white border border-slate-200 rounded-lg shadow-xl mt-1 max-h-48 overflow-y-auto">
                            {filteredOptions.map(opt => (
                                <div key={opt} className="px-3 py-2 hover:bg-sky-50 cursor-pointer text-sm text-slate-700" onMouseDown={() => handleAdd(opt)}>{opt}</div>
                            ))}
                            {input.trim() && !filteredOptions.includes(input.trim()) && (
                                <div className="px-3 py-2 hover:bg-sky-50 cursor-pointer text-sm text-sky-600 font-medium border-t border-slate-100" onMouseDown={() => handleAdd(input.trim())}>Agregar "{input}"</div>
                            )}
                        </div>
                    )}
                </div>
            );
        };

        const ListShareModal = ({ patient, onClose }) => {
            const [copied, setCopied] = useState(false);
            if (!patient) return null;
            const summary = generatePatientSummary(patient);
            const handleCopy = () => { if (copyToClipboard(summary)) { setCopied(true); setTimeout(() => setCopied(false), 2000); } };
            return (
                <Modal isOpen={!!patient} onClose={onClose} title={`Compartir de ${patient.lastName}`}>
                    <div className="max-h-80 overflow-y-auto bg-slate-50 p-3 rounded-lg border border-slate-200 mb-4">
                        <pre className="text-xs whitespace-pre-wrap font-mono text-slate-800">{summary}</pre>
                    </div>
                    <Button variant="primary" onClick={handleCopy} className={`w-full ${copied ? 'bg-emerald-500' : ''}`}>{copied ? <CheckCircle size={18} /> : <Copy size={18} />}{copied ? '¡Copiado!' : 'Copiar Texto'}</Button>
                </Modal>
            );
        };

        // --- Main App ---
        const App = () => {
            const [user, setUser] = useState(null);
            const [email, setEmail] = useState('');
            const [password, setPassword] = useState('');
            const [isRegistering, setIsRegistering] = useState(false);
            const [authError, setAuthError] = useState('');
            const [dbError, setDbError] = useState(''); 
            const [view, setView] = useState("list");
            const [patients, setPatients] = useState([]);
            const [currentPatient, setCurrentPatient] = useState(null);
            const [searchTerm, setSearchTerm] = useState("");
            const [loading, setLoading] = useState(true);
            const [sharePatientData, setSharePatientData] = useState(null); 
            const [confirmAction, setConfirmAction] = useState(null); // {title, message, onConfirm}
            const fileInputRef = useRef(null);
            const formRef = useRef(null);

            const { auth, db, appId, onAuthStateChanged, signInWithEmailAndPassword, createUserWithEmailAndPassword, signOut, collection, addDoc, updateDoc, deleteDoc, doc, onSnapshot, serverTimestamp } = window.firebaseData;

            const dynamicRepertoire = useMemo(() => {
                const baseNeonatal = ["Prematuro", "Bajo peso al nacer", "Ictericia", "Distrés respiratorio", "Sano"];
                const basePathological = ["Asma", "Alergias", "Diabetes", "Otitis recurrente", "Convulsiones", "Celiaquía"];
                const baseReasons = ["Control de Niño Sano", "Fiebre", "Tos", "Dolor de Oído", "Erupción Cutánea", "Vacunación"];
                const neonatal = new Set(baseNeonatal);
                const pathological = new Set(basePathological);
                const reasons = new Set(baseReasons);
                patients.forEach(p => {
                    p.neonatalHistory?.forEach(v => neonatal.add(v));
                    p.pathologicalHistory?.forEach(v => pathological.add(v));
                    p.consultations?.forEach(c => c.motive?.forEach(v => reasons.add(v)));
                });
                return { neonatal: Array.from(neonatal).sort(), pathological: Array.from(pathological).sort(), reasons: Array.from(reasons).sort() };
            }, [patients]);

            useEffect(() => {
                if (!auth) return;
                const unsubscribe = onAuthStateChanged(auth, (currentUser) => { setUser(currentUser); setLoading(false); });
                return () => unsubscribe();
            }, [auth]);

            useEffect(() => {
                if (!user || !db) { setPatients([]); return; }
                const colRef = collection(db, 'artifacts', appId, 'users', user.uid, 'patients');
                return onSnapshot(colRef, (snapshot) => {
                    const loaded = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                    loaded.sort((a, b) => (b.updatedAt?.seconds || 0) - (a.updatedAt?.seconds || 0));
                    setPatients(loaded);
                    setDbError(''); 
                }, (error) => {
                    if (error.code === 'permission-denied') setDbError('Error de Permisos en Firebase.');
                    else setDbError(error.message);
                });
            }, [user, db, appId]);

            const handleAuth = async (e) => {
                e.preventDefault(); setAuthError(''); setLoading(true);
                try {
                    if (isRegistering) await createUserWithEmailAndPassword(auth, email, password);
                    else await signInWithEmailAndPassword(auth, email, password);
                } catch (err) {
                    setAuthError(err.message);
                } finally { setLoading(false); }
            };

            const handleSave = async (data) => {
                if (!user || !db) return;
                setLoading(true);
                const colRef = collection(db, 'artifacts', appId, 'users', user.uid, 'patients');
                const toSave = { ...data, updatedAt: navigator.onLine ? serverTimestamp() : Date.now() };
                try {
                    if (currentPatient?.id) await updateDoc(doc(colRef, currentPatient.id), toSave);
                    else await addDoc(colRef, { ...toSave, createdAt: navigator.onLine ? serverTimestamp() : Date.now() });
                    setView("list"); setCurrentPatient(null);
                } catch (e) { alert("Error al guardar: " + e.message); }
                setLoading(false);
            };

            const handleRequestExit = () => {
                if (formRef.current && formRef.current.getIsDirty()) {
                    setConfirmAction({
                        title: "¿Salir sin guardar?",
                        message: "Tienes cambios sin guardar en la ficha del paciente. Si sales ahora, se perderán.",
                        onConfirm: () => { setView("list"); setCurrentPatient(null); setConfirmAction(null); }
                    });
                } else {
                    setView("list");
                    setCurrentPatient(null);
                }
            };

            const filtered = patients.filter(p => `${p.firstName} ${p.lastName} ${p.dni}`.toLowerCase().includes(searchTerm.toLowerCase()));
            const listToRender = searchTerm ? filtered : filtered.slice(0, 10);

            if (loading && !authError) return <div className="h-screen flex items-center justify-center text-slate-500 font-bold text-xl">PediApp cargando...</div>;

            if (!user) {
                return (
                    <div className="min-h-screen bg-slate-50 flex items-center justify-center p-4">
                        <Card className="w-full max-w-md p-8 shadow-xl">
                            <div className="flex flex-col items-center gap-3 mb-8">
                                <div className="bg-sky-100 p-4 rounded-full text-sky-600"><Stethoscope size={40} /></div>
                                <h1 className="text-2xl font-bold text-slate-800">PediApp</h1>
                            </div>
                            <form className="space-y-4" onSubmit={handleAuth}>
                                <div><label className="block text-sm font-bold text-slate-700">Email</label><input type="email" required className="w-full p-3 border rounded-lg" value={email} onChange={e => setEmail(e.target.value)} /></div>
                                <div><label className="block text-sm font-bold text-slate-700">Contraseña</label><input type="password" required className="w-full p-3 border rounded-lg" value={password} onChange={e => setPassword(e.target.value)} /></div>
                                <Button type="submit" className="w-full">{isRegistering ? 'Crear Cuenta' : 'Iniciar Sesión'}</Button>
                            </form>
                            <button onClick={() => setIsRegistering(!isRegistering)} className="w-full mt-4 text-sky-600 text-sm font-bold">{isRegistering ? 'Ya tengo cuenta' : 'Crear cuenta'}</button>
                        </Card>
                    </div>
                );
            }

            return (
                <div className="max-w-md mx-auto min-h-screen bg-slate-50 pb-20 md:max-w-2xl lg:max-w-4xl shadow-2xl">
                    <ConfirmModal isOpen={!!confirmAction} {...confirmAction} onCancel={() => setConfirmAction(null)} />
                    {sharePatientData && <ListShareModal patient={sharePatientData} onClose={() => setSharePatientData(null)} />}
                    <header className="bg-white px-4 py-4 sticky top-0 z-20 border-b flex items-center justify-between">
                        <div className="flex items-center gap-2 text-sky-600"><Baby size={28} /><h1 className="text-xl font-bold text-slate-800">PediApp</h1></div>
                        <div className="flex items-center gap-2">
                            {view === 'form' && <Button variant="secondary" onClick={handleRequestExit} className="text-xs py-1"><ArrowLeft size={16} /> Volver</Button>}
                            {view === 'list' && (
                                <button onClick={() => setConfirmAction({ title: "¿Cerrar sesión?", message: "Se cerrará el acceso a tu cuenta en este dispositivo.", onConfirm: () => { signOut(auth); setConfirmAction(null); } })} className="text-slate-400 hover:text-rose-500 p-2"><LogOut size={20} /></button>
                            )}
                        </div>
                    </header>

                    <main className="p-4">
                        {dbError && <div className="bg-rose-50 p-4 rounded-xl text-rose-600 font-bold mb-4">{dbError}</div>}
                        {view === 'list' ? (
                            <div className="space-y-6">
                                <div className="bg-white p-4 rounded-xl shadow-sm space-y-4">
                                    <div className="relative">
                                        <Search className="absolute left-3 top-1/2 -translate-y-1/2 text-slate-400" size={20} />
                                        <input type="text" placeholder="Buscar paciente..." className="w-full pl-10 pr-4 py-3 bg-slate-50 rounded-lg outline-none" value={searchTerm} onChange={(e) => setSearchTerm(e.target.value)} />
                                    </div>
                                    <Button onClick={() => { setCurrentPatient(null); setView('form'); }} className="w-full"><Plus size={20} /> Nuevo Paciente</Button>
                                    <div className="flex gap-2 text-xs">
                                        <Button variant="secondary" className="flex-1" onClick={() => downloadBackup(buildBackupData(patients))}>Exportar</Button>
                                        <Button variant="secondary" className="flex-1" onClick={() => fileInputRef.current?.click()}>Importar</Button>
                                        <input type="file" ref={fileInputRef} className="hidden" accept=".json" onChange={handleSave} />
                                    </div>
                                </div>
                                <div className="space-y-3">
                                    {listToRender.map(p => (
                                        <Card key={p.id} className="cursor-pointer relative" onClick={() => { setCurrentPatient(p); setView('form'); }}>
                                            <div className="pr-16">
                                                <h3 className="font-bold text-slate-800">{p.lastName}, {p.firstName}</h3>
                                                <p className="text-slate-500 text-xs">DNI: {p.dni} | {calculateAge(p.birthDate)}</p>
                                            </div>
                                            <div className="absolute top-4 right-2 flex gap-1">
                                                <button onClick={(e) => { e.stopPropagation(); setSharePatientData(p); }} className="text-sky-500 p-2"><Share2 size={18} /></button>
                                                <button onClick={(e) => { e.stopPropagation(); setConfirmAction({ title: "¿Eliminar paciente?", message: `¿Estás seguro de eliminar a ${p.firstName}? Esta acción no se puede deshacer.`, onConfirm: async () => { await deleteDoc(doc(db, 'artifacts', appId, 'users', user.uid, 'patients', p.id)); setConfirmAction(null); } }); }} className="text-rose-400 p-2"><Trash2 size={18} /></button>
                                            </div>
                                        </Card>
                                    ))}
                                </div>
                            </div>
                        ) : (
                            <PatientForm ref={formRef} initialData={currentPatient} onSave={handleSave} onCancel={handleRequestExit} options={dynamicRepertoire} />
                        )}
                    </main>
                </div>
            );
        };

        const PatientForm = React.forwardRef(({ initialData, onSave, onCancel, options }, ref) => {
            const [saving, setSaving] = useState(false);
            const [formData, setFormData] = useState({ firstName: '', lastName: '', dni: '', birthDate: '', phone: '', neonatalHistory: [], pathologicalHistory: [], pendingItems: [], images: [], consultations: [] });
            const [newConsultation, setNewConsultation] = useState({ date: new Date().toLocaleDateString('en-CA'), motive: [], weight: '', height: '', headCircumference: '', notes: '' });
            const [newPending, setNewPending] = useState("");
            const [showHistory, setShowHistory] = useState(false);
            const [editingId, setEditingId] = useState(null);
            const [editData, setEditData] = useState(null);
            const [isDirty, setIsDirty] = useState(false);

            useEffect(() => { if (initialData) setFormData({ ...initialData }); }, [initialData]);

            React.useImperativeHandle(ref, () => ({
                getIsDirty: () => isDirty || !!(newConsultation.weight || newConsultation.height || newConsultation.notes || newConsultation.motive.length > 0)
            }));

            const updateField = (field, value) => { setFormData(p => ({ ...p, [field]: value })); setIsDirty(true); };

            const handleImage = (e) => {
                const file = e.target.files[0];
                if (!file) return;
                const reader = new FileReader();
                reader.onloadend = () => {
                    const img = new Image();
                    img.src = reader.result;
                    img.onload = () => {
                        const canvas = document.createElement('canvas');
                        const ctx = canvas.getContext('2d');
                        const maxDim = 800; 
                        let w = img.width, h = img.height;
                        if (w > maxDim || h > maxDim) { const r = Math.min(maxDim / w, maxDim / h); w *= r; h *= r; }
                        canvas.width = w; canvas.height = h;
                        ctx.drawImage(img, 0, 0, w, h);
                        updateField('images', [...(formData.images || []), { id: Date.now(), src: canvas.toDataURL('image/jpeg', 0.7), date: new Date().toLocaleDateString('es-AR') }]);
                    };
                };
                reader.readAsDataURL(file);
            };

            const handleSubmit = (e) => {
                e.preventDefault(); setSaving(true);
                let consultations = [...(formData.consultations || [])];
                const { weight, height, headCircumference, notes, motive } = newConsultation;
                if (weight || height || headCircumference || notes || motive.length > 0) {
                    const [y, m, d] = newConsultation.date.split("-").map(Number);
                    consultations.push({ ...newConsultation, date: new Date(y, m - 1, d, 12, 0, 0).getTime(), id: Date.now() });
                }
                onSave({ ...formData, consultations: consultations.sort((a,b) => b.date - a.date) });
            };

            const saveEdit = () => {
                const [y, m, d] = editData.dateStr.split("-").map(Number);
                const updated = { ...editData, date: new Date(y, m - 1, d, 12, 0, 0).getTime() };
                delete updated.dateStr;
                updateField('consultations', formData.consultations.map(c => c.id === editingId ? updated : c).sort((a,b) => b.date - a.date));
                setEditingId(null); setEditData(null);
            };

            return (
                <form className="space-y-6 pb-24" onSubmit={handleSubmit}>
                    <Card className="border-l-4 border-sky-500">
                        <div className="flex gap-2 mb-4 text-sky-800 font-bold"><User size={20} />Datos Personales</div>
                        <div className="grid grid-cols-2 gap-3 text-sm">
                            <input placeholder="Nombre" required className="p-2 border rounded" value={formData.firstName} onChange={e => updateField('firstName', e.target.value)} />
                            <input placeholder="Apellido" required className="p-2 border rounded" value={formData.lastName} onChange={e => updateField('lastName', e.target.value)} />
                            <input placeholder="DNI" required type="number" className="p-2 border rounded" value={formData.dni} onChange={e => updateField('dni', e.target.value)} />
                            <input placeholder="Fecha Nac." required type="date" className="p-2 border rounded" value={formData.birthDate} onChange={e => updateField('birthDate', e.target.value)} />
                            <input placeholder="Teléfono" type="tel" className="p-2 border rounded col-span-2" value={formData.phone || ''} onChange={e => updateField('phone', e.target.value)} />
                        </div>
                    </Card>

                    <Card>
                        <div className="flex gap-2 mb-4 text-sky-800 font-bold"><Activity size={20} />Antecedentes</div>
                        <div className="space-y-3">
                            <TagInput label="Neonatales" options={options.neonatal} value={formData.neonatalHistory} onChange={v => updateField('neonatalHistory', v)} />
                            <TagInput label="Patológicos" options={options.pathological} value={formData.pathologicalHistory} onChange={v => updateField('pathologicalHistory', v)} />
                        </div>
                    </Card>

                    <Card>
                        <div className="flex gap-2 mb-4 text-sky-800 font-bold"><Stethoscope size={20} />Consulta Actual</div>
                        <div className="space-y-3 bg-slate-50 p-3 rounded-lg">
                            <input type="date" className="w-full p-2 border rounded text-sm" value={newConsultation.date} onChange={e => setNewConsultation({...newConsultation, date: e.target.value})} />
                            <TagInput label="Motivo" options={options.reasons} value={newConsultation.motive} onChange={v => setNewConsultation({...newConsultation, motive: v})} />
                            <div className="grid grid-cols-3 gap-2">
                                <input placeholder="Peso" type="number" step="0.01" className="p-2 border rounded text-xs" value={newConsultation.weight} onChange={e => setNewConsultation({...newConsultation, weight: e.target.value})} />
                                <input placeholder="Talla" type="number" step="0.1" className="p-2 border rounded text-xs" value={newConsultation.height} onChange={e => setNewConsultation({...newConsultation, height: e.target.value})} />
                                <input placeholder="P.C." type="number" step="0.1" className="p-2 border rounded text-xs" value={newConsultation.headCircumference} onChange={e => setNewConsultation({...newConsultation, headCircumference: e.target.value})} />
                            </div>
                            <textarea placeholder="Evolución clínica..." className="w-full p-2 border rounded text-sm h-20" value={newConsultation.notes} onChange={e => setNewConsultation({...newConsultation, notes: e.target.value})} />
                        </div>
                        
                        <div className="mt-4">
                            <button type="button" onClick={() => setShowHistory(!showHistory)} className="text-sm font-bold text-slate-500 flex items-center gap-1">Historial {showHistory ? '▲' : '▼'}</button>
                            {showHistory && (
                                <div className="mt-3 space-y-2">
                                    {(formData.consultations || []).map(c => (
                                        <div key={c.id} className="p-2 border rounded bg-white text-xs shadow-sm">
                                            {editingId === c.id ? (
                                                <div className="space-y-2">
                                                    <input type="date" className="p-1 border rounded w-full" value={editData.dateStr} onChange={e => setEditData({...editData, dateStr: e.target.value})} />
                                                    <TagInput label="Motivo" options={options.reasons} value={editData.motive} onChange={v => setEditData({...editData, motive: v})} />
                                                    <div className="flex gap-2"><input placeholder="P" className="w-1/3 border p-1" value={editData.weight} onChange={e=>setEditData({...editData, weight: e.target.value})} /><input placeholder="T" className="w-1/3 border p-1" value={editData.height} onChange={e=>setEditData({...editData, height: e.target.value})} /><input placeholder="PC" className="w-1/3 border p-1" value={editData.headCircumference} onChange={e=>setEditData({...editData, headCircumference: e.target.value})} /></div>
                                                    <textarea className="w-full border p-1" value={editData.notes} onChange={e=>setEditData({...editData, notes: e.target.value})} />
                                                    <div className="flex gap-2"><Button variant="primary" className="flex-1 py-1" onClick={saveEdit}>OK</Button><Button variant="secondary" className="flex-1 py-1" onClick={() => setEditingId(null)}>X</Button></div>
                                                </div>
                                            ) : (
                                                <>
                                                    <div className="flex justify-between font-bold text-sky-600 mb-1">
                                                        <span>{formatDate(c.date)}</span>
                                                        <div className="flex gap-2">
                                                            <button type="button" onClick={() => { setEditingId(c.id); setEditData({...c, dateStr: new Date(c.date).toISOString().split('T')[0]}); }}><Edit size={12} /></button>
                                                            <button type="button" className="text-rose-400" onClick={() => updateField('consultations', formData.consultations.filter(x => x.id !== c.id))}><Trash2 size={12} /></button>
                                                        </div>
                                                    </div>
                                                    <p>Motivo: {c.motive?.join(', ') || 'Sin motivo'}</p>
                                                    <p className="italic">{c.notes}</p>
                                                </>
                                            )}
                                        </div>
                                    ))}
                                </div>
                            )}
                        </div>
                    </Card>

                    <Card className="bg-amber-50">
                        <div className="flex gap-2 mb-3 text-amber-700 font-bold"><AlertCircle size={20} />Pendientes</div>
                        <div className="flex gap-2">
                            <input className="flex-1 p-2 border rounded" value={newPending} onChange={e=>setNewPending(e.target.value)} />
                            <Button variant="secondary" onClick={()=>{ if(newPending.trim()){ updateField('pendingItems', [...(formData.pendingItems || []), {id:Date.now(), text:newPending}]); setNewPending(""); } }}><Plus size={18}/></Button>
                        </div>
                        <ul className="mt-2 space-y-1">
                            {(formData.pendingItems || []).map(i => (
                                <li key={i.id} className="flex justify-between items-center p-2 bg-white rounded border text-sm">
                                    {i.text}<button type="button" onClick={()=>updateField('pendingItems', formData.pendingItems.filter(x=>x.id!==i.id))} className="text-emerald-500"><CheckCircle size={18}/></button>
                                </li>
                            ))}
                        </ul>
                    </Card>

                    <div className="fixed bottom-0 left-0 right-0 p-4 bg-white border-t flex gap-4 md:static md:bg-transparent md:p-0 md:border-0">
                        <Button variant="danger" className="flex-1" onClick={onCancel}>Cancelar</Button>
                        <Button type="submit" className="flex-1" disabled={saving}>{saving ? "Guardando..." : "Guardar Paciente"}</Button>
                    </div>
                </form>
            );
        });

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
