<!DOCTYPE html>
<html lang="es">
<head>
    <link rel="manifest" href="manifest.json">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#0ea5e9">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="PediApp">
    <title>PediApp</title>
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- React Dependencies -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
    
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%230EA5E9' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'%3E%3Cpath d='M4.8 2.3A.3.3 0 1 0 5 2H4a2 2 0 0 0-2 2v5a6 6 0 0 0 6 6v0a6 6 0 0 0 6-6V4a2 2 0 0 0-2-2h-1a.2.2 0 1 0 .3.3'%3E%3C/path%3E%3Cpath d='M8 15v1a6 6 0 0 0 6 6v0a6 6 0 0 0 6-6v-4'%3E%3C/path%3E%3Ccircle cx='20' cy='10' r='2'%3E%3C/circle%3E%3C/svg%3E" type="image/svg+xml">

    <style>
        body { font-family: 'Nunito', sans-serif; background-color: #f0f9ff; }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(10px); } to { transform: translateY(0); } }
        .animate-fade-in { animation: fadeIn 0.2s ease-out; }
        .animate-fade-in-up { animation: fadeInUp 0.3s ease-out; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, setPersistence, browserLocalPersistence, onAuthStateChanged, signInWithEmailAndPassword, createUserWithEmailAndPassword, signOut } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { initializeFirestore, persistentLocalCache, persistentMultipleTabManager, collection, addDoc, updateDoc, deleteDoc, doc, onSnapshot, serverTimestamp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCfBgsLgnDGkkE_u0ZhXJs8SCczP531dg4",
            authDomain: "pediapp-61b0c.firebaseapp.com",
            projectId: "pediapp-61b0c",
            storageBucket: "pediapp-61b0c.firebasestorage.app",
            messagingSenderId: "639384422144",
            appId: "1:639384422144:web:924e5fcbf41bb2d1cd15e5"
        };

        const appId = "historia-clinica-v1";
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = initializeFirestore(app, {
            localCache: persistentLocalCache({ tabManager: persistentMultipleTabManager() })
        });
        
        setPersistence(auth, browserLocalPersistence);

        window.firebaseData = { 
            auth, db, appId, onAuthStateChanged, signInWithEmailAndPassword, createUserWithEmailAndPassword, signOut,
            collection, addDoc, updateDoc, deleteDoc, doc, onSnapshot, serverTimestamp 
        };
        window.dispatchEvent(new Event('firebase-ready'));
    </script>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;
        
        // --- Icons ---
        const Icon = ({ children, size = 24, className = "", ...props }) => (
            <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={`lucide ${className}`} {...props}>{children}</svg>
        );
        const User = (props) => <Icon {...props}><path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></Icon>;
        const Plus = (props) => <Icon {...props}><path d="M5 12h14"/><path d="M12 5v14"/></Icon>;
        const Search = (props) => <Icon {...props}><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></Icon>;
        const Trash2 = (props) => <Icon {...props}><path d="M3 6h18"/><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"/><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"/><line x1="10" x2="10" y1="11" y2="17"/><line x1="14" x2="14" y1="11" y2="17"/></Icon>;
        const ArrowLeft = (props) => <Icon {...props}><line x1="19" x2="5" y1="12" y2="12"/><polyline points="12 19 5 12 12 5"/></Icon>;
        const Baby = (props) => <Icon {...props}><path d="M9 12h.01"/><path d="M15 12h.01"/><path d="M10 16c.5.3 1.2.5 2 .5s1.5-.2 2-.5"/><path d="M19 6.3a9 9 0 0 1 1.8 3.9 2 2 0 0 1 0 3.6 9 9 0 0 1-17.6 0 2 2 0 0 1 0-3.6A9 9 0 0 1 12 3c2 0 3.5 1.1 3.5 2.5s-.9 2.5-2 2.5c-.8 0-1.5-.4-1.5-1"/></Icon>;
        const Stethoscope = (props) => <Icon {...props}><path d="M4.8 2.3A.3.3 0 1 0 5 2H4a2 2 0 0 0-2 2v5a6 6 0 0 0 6 6v0a6 6 0 0 0 6-6V4a2 2 0 0 0-2-2h-1a.2.2 0 1 0 .3.3"/><path d="M8 15v1a6 6 0 0 0 6 6v0a6 6 0 0 0 6-6v-4"/><circle cx="20" cy="10" r="2"/></Icon>;
        const Settings = (props) => <Icon {...props}><path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.08a2 2 0 0 1-1-1.74v-.5a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z"/><circle cx="12" cy="12" r="3"/></Icon>;
        const Edit = (props) => <Icon {...props}><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></Icon>;
        const LogOut = (props) => <Icon {...props}><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" x2="9" y1="12" y2="12"/></Icon>;
        const Activity = (props) => <Icon {...props}><path d="M22 12h-4l-3 9L9 3l-3 9H2"/></Icon>;
        const Check = (props) => <Icon {...props}><polyline points="20 6 9 17 4 12"/></Icon>;
        const X = (props) => <Icon {...props}><path d="M18 6 6 18"/><path d="m6 6 12 12"/></Icon>;

        // --- UI Base ---
        const Card = ({ children, className = "", onClick }) => (
            <div onClick={onClick} className={`bg-white rounded-xl shadow-sm border border-slate-100 p-4 ${className}`}>{children}</div>
        );

        const Button = ({ children, onClick, variant = "primary", className = "", type = "button", disabled = false }) => {
            const baseStyle = "px-4 py-2 rounded-lg font-bold transition-all flex items-center justify-center gap-2 active:scale-95 disabled:opacity-50";
            const variants = {
                primary: "bg-sky-500 text-white hover:bg-sky-600 shadow-lg shadow-sky-500/30",
                secondary: "bg-slate-100 text-slate-700 hover:bg-slate-200",
                danger: "bg-rose-50 text-rose-600 hover:bg-rose-100 border border-rose-200",
            };
            return <button type={type} onClick={onClick} disabled={disabled} className={`${baseStyle} ${variants[variant]} ${className}`}>{children}</button>;
        };

        const SuggestionInput = ({ label, options = [], value, onChange, placeholder, className = "" }) => {
            const [isOpen, setIsOpen] = useState(false);
            const [localValue, setLocalValue] = useState(value || "");
            useEffect(() => { setLocalValue(value || ""); }, [value]);
            const filteredOptions = options.filter(opt => opt.toLowerCase().includes(localValue.toLowerCase()) && opt.toLowerCase() !== localValue.toLowerCase());
            return (
                <div className={`relative flex flex-col gap-1 ${className}`}>
                    <label className="text-[10px] font-bold text-slate-500 uppercase px-1">{label}</label>
                    <input type="text" value={localValue} onChange={(e) => { setLocalValue(e.target.value); onChange(e.target.value); setIsOpen(true); }}
                        onFocus={() => setIsOpen(true)} onBlur={() => setTimeout(() => setIsOpen(false), 200)}
                        placeholder={placeholder} className="p-3 border rounded-lg bg-slate-50 w-full focus:bg-white text-sm outline-none" />
                    {isOpen && filteredOptions.length > 0 && (
                        <div className="absolute z-50 top-full left-0 right-0 bg-white border border-slate-200 rounded-lg shadow-xl mt-1 max-h-40 overflow-y-auto">
                            {filteredOptions.map(opt => (
                                <div key={opt} className="px-3 py-2 hover:bg-sky-50 cursor-pointer text-sm text-slate-700" onMouseDown={() => { onChange(opt); setLocalValue(opt); setIsOpen(false); }}>{opt}</div>
                            ))}
                        </div>
                    )}
                </div>
            );
        };

        const TagInput = ({ label, options, value = [], onChange, placeholder }) => {
            const [input, setInput] = useState("");
            const [isOpen, setIsOpen] = useState(false);
            const handleAdd = (tag) => {
                const cleanTag = tag.trim();
                if (cleanTag && !value.includes(cleanTag)) { onChange([...value, cleanTag]); }
                setInput(""); setIsOpen(false);
            };
            const handleRemove = (tagToRemove) => { onChange(value.filter(t => t !== tagToRemove)); };
            const filteredOptions = options ? options.filter(opt => opt.toLowerCase().includes(input.toLowerCase()) && !value.includes(opt)) : [];
            return (
                <div className="space-y-2 relative">
                    <label className="block text-sm font-semibold text-slate-700">{label}</label>
                    <div className="flex flex-wrap gap-2 p-2 bg-slate-50 border border-slate-200 rounded-lg min-h-[42px]">
                        {value.map(tag => (
                            <span key={tag} className="bg-sky-100 text-sky-700 text-sm px-2 py-1 rounded-md flex items-center gap-1">
                                {tag}<button type="button" onClick={() => handleRemove(tag)}><X size={14} /></button>
                            </span>
                        ))}
                        <input type="text" value={input} onChange={(e) => { setInput(e.target.value); setIsOpen(true); }}
                            onFocus={() => setIsOpen(true)} onBlur={() => setTimeout(() => setIsOpen(false), 200)}
                            className="bg-transparent outline-none flex-1 min-w-[120px] text-sm" placeholder={placeholder} />
                    </div>
                    {isOpen && filteredOptions.length > 0 && (
                        <div className="absolute z-10 top-full left-0 right-0 bg-white border border-slate-200 rounded-lg shadow-xl mt-1 max-h-48 overflow-y-auto">
                            {filteredOptions.map(opt => (
                                <div key={opt} className="px-3 py-2 hover:bg-sky-50 cursor-pointer text-sm text-slate-700" onMouseDown={() => handleAdd(opt)}>{opt}</div>
                            ))}
                        </div>
                    )}
                </div>
            );
        };

        // --- Main Views ---
        const AuthView = () => {
            const [email, setEmail] = useState("");
            const [password, setPassword] = useState("");
            const [isRegistering, setIsRegistering] = useState(false);
            const [error, setError] = useState("");

            const handleAuth = async (e) => {
                e.preventDefault(); setError("");
                const { auth, signInWithEmailAndPassword, createUserWithEmailAndPassword } = window.firebaseData;
                try {
                    if (isRegistering) await createUserWithEmailAndPassword(auth, email, password);
                    else await signInWithEmailAndPassword(auth, email, password);
                } catch (err) { setError("Error: Credenciales inválidas o problema de red."); }
            };

            return (
                <div className="min-h-screen bg-slate-50 flex items-center justify-center p-4">
                    <Card className="w-full max-w-sm p-8 shadow-xl">
                        <div className="flex flex-col items-center gap-3 mb-8">
                            <div className="bg-sky-100 p-4 rounded-full text-sky-600"><Stethoscope size={40} /></div>
                            <h1 className="text-2xl font-extrabold text-slate-800">PediApp</h1>
                        </div>
                        <form className="space-y-4" onSubmit={handleAuth}>
                            <input type="email" required placeholder="Email" className="w-full p-3 border rounded-lg text-sm" value={email} onChange={e => setEmail(e.target.value)} />
                            <input type="password" required placeholder="Contraseña" className="w-full p-3 border rounded-lg text-sm" value={password} onChange={e => setPassword(e.target.value)} />
                            <Button type="submit" className="w-full">{isRegistering ? 'Crear Cuenta' : 'Ingresar'}</Button>
                        </form>
                        <button onClick={() => setIsRegistering(!isRegistering)} className="w-full mt-4 text-sky-600 text-xs font-bold uppercase tracking-widest">{isRegistering ? 'Ya tengo cuenta' : '¿Nuevo usuario? Regístrate'}</button>
                        {error && <p className="mt-4 text-rose-500 text-[10px] text-center font-bold uppercase tracking-tight">{error}</p>}
                    </Card>
                </div>
            );
        };

        const App = () => {
            const [user, setUser] = useState(null);
            const [isLoading, setIsLoading] = useState(true);
            const [view, setView] = useState("list");
            const [patients, setPatients] = useState([]);
            const [currentPatient, setCurrentPatient] = useState(null);
            const [searchTerm, setSearchTerm] = useState("");
            const [confirmState, setConfirmState] = useState({ isOpen: false });

            useEffect(() => {
                const init = () => {
                    const { auth, onAuthStateChanged } = window.firebaseData;
                    onAuthStateChanged(auth, (u) => {
                        setUser(u);
                        setIsLoading(false);
                    });
                };
                if (window.firebaseData) init();
                else window.addEventListener('firebase-ready', init);
            }, []);

            useEffect(() => {
                if (!user) return;
                const { db, appId, collection, onSnapshot } = window.firebaseData;
                const colRef = collection(db, 'artifacts', appId, 'users', user.uid, 'patients');
                return onSnapshot(colRef, (snap) => setPatients(snap.docs.map(d => ({ id: d.id, ...d.data() }))));
            }, [user]);

            const dynamicRepertoire = useMemo(() => {
                const neonatal = new Set(); const pathological = new Set();
                const reasons = new Set(); const insurances = new Set(); const plans = new Set();
                patients.forEach(p => {
                    p.neonatalHistory?.forEach(v => neonatal.add(v));
                    p.pathologicalHistory?.forEach(v => pathological.add(v));
                    p.consultations?.forEach(c => c.motive?.forEach(v => reasons.add(v)));
                    if (p.insurance) insurances.add(p.insurance);
                    if (p.plan) plans.add(p.plan);
                });
                return { neonatal: Array.from(neonatal).sort(), pathological: Array.from(pathological).sort(), reasons: Array.from(reasons).sort(), insurances: Array.from(insurances).sort(), plans: Array.from(plans).sort() };
            }, [patients]);

            if (isLoading) return <div className="h-screen flex items-center justify-center font-bold text-sky-600 animate-pulse uppercase tracking-widest">Iniciando...</div>;
            if (!user) return <AuthView />;

            return (
                <div className="max-w-md mx-auto min-h-screen bg-slate-50 pb-20 shadow-xl relative">
                    {confirmState.isOpen && (
                        <div className="fixed inset-0 bg-black/50 z-[100] flex items-center justify-center p-4">
                            <Card className="w-full max-w-xs">
                                <h3 className="font-bold text-slate-800 mb-2">{confirmState.title}</h3>
                                <p className="text-sm text-slate-600 mb-6">{confirmState.message}</p>
                                <div className="flex gap-2">
                                    <Button variant="secondary" className="flex-1" onClick={() => setConfirmState({isOpen:false})}>Cancelar</Button>
                                    <Button variant="danger" className="flex-1" onClick={confirmState.onConfirm}>Confirmar</Button>
                                </div>
                            </Card>
                        </div>
                    )}

                    <header className="bg-white px-4 py-4 sticky top-0 z-20 border-b flex items-center justify-between">
                        <div className="flex items-center gap-2 text-sky-600 cursor-pointer" onClick={() => setView('list')}>
                            <Baby size={28} />
                            <h1 className="text-xl font-bold text-slate-800 tracking-tight">PediApp</h1>
                        </div>
                        <div className="flex items-center gap-1">
                            <button onClick={() => setView('settings')} className={`p-2 rounded-full ${view === 'settings' ? 'bg-sky-100 text-sky-600' : 'text-slate-400'}`}><Settings size={22} /></button>
                            <button onClick={() => window.firebaseData.signOut(window.firebaseData.auth)} className="p-2 text-slate-400"><LogOut size={22} /></button>
                        </div>
                    </header>

                    <main className="p-4">
                        {view === 'list' && (
                            <div className="space-y-4 animate-fade-in">
                                <div className="bg-white p-3 rounded-xl border space-y-3 shadow-sm">
                                    <div className="relative"><Search className="absolute left-3 top-1/2 -translate-y-1/2 text-slate-400" size={18} /><input placeholder="Buscar paciente u obra social..." className="w-full pl-10 pr-4 py-2 bg-slate-50 rounded-lg outline-none text-sm" value={searchTerm} onChange={e => setSearchTerm(e.target.value)} /></div>
                                    <Button onClick={() => { setCurrentPatient(null); setView('form'); }} className="w-full"><Plus size={20} /> Nuevo Paciente</Button>
                                </div>
                                {patients.filter(p => `${p.firstName} ${p.lastName} ${p.dni} ${p.insurance}`.toLowerCase().includes(searchTerm.toLowerCase())).map(p => (
                                    <Card key={p.id} onClick={() => { setCurrentPatient(p); setView('form'); }} className="cursor-pointer hover:border-sky-300 transition-colors">
                                        <div className="flex justify-between items-start">
                                            <div>
                                                <h3 className="font-bold text-slate-800">{p.lastName}, {p.firstName}</h3>
                                                <p className="text-[10px] text-slate-500 font-bold uppercase mt-1">DNI: {p.dni}</p>
                                                {p.insurance && <p className="text-[10px] text-sky-600 font-extrabold mt-1 uppercase tracking-tighter">{p.insurance} {p.plan ? `(${p.plan})` : ''}</p>}
                                            </div>
                                            <button onClick={(e) => { e.stopPropagation(); setConfirmState({isOpen:true, title:"Borrar", message:`¿Eliminar a ${p.firstName}?`, onConfirm:() => { window.firebaseData.deleteDoc(window.firebaseData.doc(window.firebaseData.db, 'artifacts', window.firebaseData.appId, 'users', user.uid, 'patients', p.id)); setConfirmState({isOpen:false}); }}); }} className="text-slate-200 hover:text-rose-400 transition-colors"><Trash2 size={18} /></button>
                                        </div>
                                    </Card>
                                ))}
                            </div>
                        )}

                        {view === 'form' && (
                            <PatientForm 
                                initialData={currentPatient} 
                                onSave={(data) => {
                                    const { db, appId, collection, addDoc, updateDoc, doc, serverTimestamp } = window.firebaseData;
                                    const colRef = collection(db, 'artifacts', appId, 'users', user.uid, 'patients');
                                    const toSave = { ...data, updatedAt: serverTimestamp() };
                                    if (currentPatient?.id) updateDoc(doc(colRef, currentPatient.id), toSave);
                                    else addDoc(colRef, { ...toSave, createdAt: serverTimestamp() });
                                    setView("list");
                                }} 
                                onCancel={() => setView('list')} 
                                options={dynamicRepertoire} 
                            />
                        )}

                        {view === 'settings' && (
                            <SettingsView repertoire={dynamicRepertoire} user={user} setConfirmState={setConfirmState} patients={patients} />
                        )}
                    </main>
                </div>
            );
        };

        const SettingsView = ({ repertoire, user, setConfirmState, patients }) => {
            const updateGlobalValue = async (category, oldValue, newValue) => {
                const { db, appId, doc, updateDoc } = window.firebaseData;
                const batch = patients.filter(p => {
                    if (category === 'insurances') return p.insurance === oldValue;
                    if (category === 'plans') return p.plan === oldValue;
                    if (category === 'neonatal') return p.neonatalHistory?.includes(oldValue);
                    if (category === 'pathological') return p.pathologicalHistory?.includes(oldValue);
                    return false;
                });
                for (const p of batch) {
                    let update = {};
                    if (category === 'insurances') update = { insurance: newValue };
                    if (category === 'plans') update = { plan: newValue };
                    if (category === 'neonatal') update = { neonatalHistory: newValue ? p.neonatalHistory.map(v => v === oldValue ? newValue : v) : p.neonatalHistory.filter(v => v !== oldValue) };
                    if (category === 'pathological') update = { pathologicalHistory: newValue ? p.pathologicalHistory.map(v => v === oldValue ? newValue : v) : p.pathologicalHistory.filter(v => v !== oldValue) };
                    await updateDoc(doc(db, 'artifacts', appId, 'users', user.uid, 'patients', p.id), update);
                }
            };

            const [editState, setEditState] = useState(null);

            const CategoryList = ({ title, items, categoryKey }) => (
                <div className="space-y-2">
                    <h4 className="text-[10px] font-bold text-slate-400 uppercase tracking-widest px-1">{title}</h4>
                    <div className="space-y-1">
                        {items.map(item => (
                            <div key={item} className="bg-white p-3 rounded-xl border flex justify-between items-center">
                                {editState?.value === item && editState?.category === categoryKey ? (
                                    <div className="flex gap-1 w-full">
                                        <input autoFocus className="flex-1 text-sm border p-1 rounded" id={`edit-${item}`} defaultValue={item} />
                                        <button onClick={() => { updateGlobalValue(categoryKey, item, document.getElementById(`edit-${item}`).value); setEditState(null); }} className="text-emerald-500"><Check size={18}/></button>
                                        <button onClick={() => setEditState(null)} className="text-slate-400"><X size={18}/></button>
                                    </div>
                                ) : (
                                    <>
                                        <span className="text-xs font-bold text-slate-700">{item}</span>
                                        <div className="flex gap-2">
                                            <button onClick={() => setEditState({category: categoryKey, value: item})} className="text-sky-400 hover:text-sky-600"><Edit size={16}/></button>
                                            <button onClick={() => setConfirmState({ isOpen: true, title: "Eliminar", message: `¿Quitar "${item}" de todos los registros?`, onConfirm: () => { updateGlobalValue(categoryKey, item, null); setConfirmState({isOpen:false}); } })} className="text-rose-300 hover:text-rose-500"><Trash2 size={16}/></button>
                                        </div>
                                    </>
                                )}
                            </div>
                        ))}
                    </div>
                </div>
            );

            return (
                <div className="space-y-6 animate-fade-in-up">
                    <div className="bg-sky-500 p-6 rounded-2xl text-white shadow-lg shadow-sky-500/20">
                        <h2 className="text-lg font-extrabold flex items-center gap-2"><Settings size={22}/> Gestión Global</h2>
                        <p className="text-[10px] opacity-80 uppercase tracking-widest mt-1 font-bold">Edita erratas de Obras Sociales o Antecedentes en un solo paso.</p>
                    </div>
                    <CategoryList title="Obras Sociales" items={repertoire.insurances} categoryKey="insurances" />
                    <CategoryList title="Planes" items={repertoire.plans} categoryKey="plans" />
                    <CategoryList title="Antecedentes Neonatales" items={repertoire.neonatal} categoryKey="neonatal" />
                </div>
            );
        };

        const PatientForm = ({ initialData, onSave, onCancel, options }) => {
            const [formData, setFormData] = useState({ firstName: '', lastName: '', dni: '', birthDate: '', phone: '', insurance: '', plan: '', memberNumber: '', neonatalHistory: [], pathologicalHistory: [], consultations: [] });
            const [newConsultation, setnewConsultation] = useState({ date: new Date().toLocaleDateString('en-CA'), motive: [], weight: '', height: '', headCircumference: '', notes: '' });

            useEffect(() => { if (initialData) setFormData({ ...initialData }); }, [initialData]);

            return (
                <form className="space-y-6 animate-fade-in-up pb-10" onSubmit={e => { e.preventDefault(); onSave(formData); }}>
                    <div className="flex gap-2 mb-4 text-sky-800 font-bold uppercase text-[10px] tracking-widest border-l-4 border-sky-500 pl-3 py-1">Ficha del Paciente</div>
                    <div className="grid grid-cols-2 gap-3 text-sm">
                        <input placeholder="Nombre" required className="p-3 border rounded-xl bg-white outline-none focus:ring-2 ring-sky-100" value={formData.firstName} onChange={e => setFormData({...formData, firstName: e.target.value})} />
                        <input placeholder="Apellido" required className="p-3 border rounded-xl bg-white outline-none focus:ring-2 ring-sky-100" value={formData.lastName} onChange={e => setFormData({...formData, lastName: e.target.value})} />
                        <input placeholder="DNI" required type="number" className="p-3 border rounded-xl bg-white outline-none focus:ring-2 ring-sky-100" value={formData.dni} onChange={e => setFormData({...formData, dni: e.target.value})} />
                        <input required type="date" className="p-3 border rounded-xl bg-white outline-none focus:ring-2 ring-sky-100" value={formData.birthDate} onChange={e => setFormData({...formData, birthDate: e.target.value})} />
                        <SuggestionInput label="Obra Social" options={options.insurances} value={formData.insurance} onChange={v => setFormData({...formData, insurance: v})} className="col-span-2" />
                        <SuggestionInput label="Plan" options={options.plans} value={formData.plan} onChange={v => setFormData({...formData, plan: v})} />
                        <div className="flex flex-col gap-1">
                            <label className="text-[10px] font-bold text-slate-400 uppercase px-1">Nro Afiliado</label>
                            <input className="p-3 border rounded-xl bg-white text-sm outline-none focus:ring-2 ring-sky-100" value={formData.memberNumber || ''} onChange={e => setFormData({...formData, memberNumber: e.target.value})} />
                        </div>
                    </div>

                    <Card>
                        <div className="flex gap-2 mb-4 text-sky-800 font-bold uppercase text-[10px] tracking-widest">Historial Médico</div>
                        <TagInput label="Neonatales" options={options.neonatal} value={formData.neonatalHistory} onChange={v => setFormData({...formData, neonatalHistory: v})} />
                        <TagInput label="Patológicos" options={options.pathological} value={formData.pathologicalHistory} onChange={v => setFormData({...formData, pathologicalHistory: v})} />
                    </Card>

                    <div className="fixed bottom-0 left-0 right-0 p-4 bg-white/80 backdrop-blur-md border-t flex gap-4 z-40">
                        <Button variant="secondary" className="flex-1" onClick={onCancel}>Cancelar</Button>
                        <Button type="submit" className="flex-1 shadow-lg shadow-sky-500/30">Guardar Ficha</Button>
                    </div>
                </form>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
